org: Intro-to-Data-Science-E1339
org_name: Intro to Data Science
course_name: Intro to Data Science
course_code: GRAD-E1339

# This is the persistent COURSE org - it spans many cohorts (years). Cohorts are
# registered separately in .github/cohort-courses-pages.yml.

# ---------------------------------------------------------------------------
# People. Two DIFFERENT things live under the `people:` key below - don't
# confuse them:
#
#   course_admins        GRANTS ACCESS. The single source of truth for course-wide
#                        admin rights - the `course-admin` team here, mirrored into
#                        every cohort org. "Sync membership" reconciles that team
#                        FROM this list: a handle added any other way (Teams UI, a
#                        gh call) is reverted on the next sync unless it's declared
#                        here, and removing a handle here revokes their access.
#
#   instructors          DISPLAY ONLY - website cards (name/photo/title/link) for
#                        the OPTIONAL public open-courseware course website (the
#                        "Publish course website" action). They grant NO GitHub
#                        access. TAs are NOT declared here - they change every
#                        cohort, so a cohort's whole teaching team (instructors &
#                        TAs, their GitHub access AND their cohort-site cards) is
#                        declared PER COHORT in that cohort's classroom-config/people.yml.
# ---------------------------------------------------------------------------
people:
  course_admins:
    - github_handle: "henrycgbaker"    # required - grants the `course-admin` team

  # Instructor website cards (optional, DISPLAY ONLY - no GitHub access) for the
  # OPTIONAL public open-courseware course website. TAs are NOT listed here - a
  # cohort's own teaching team (instructors & TAs) goes in that cohort's
  # classroom-config/people.yml instead.
  instructors:
    - github_handle: "simonmunzert"
      name: "Prof. Dr. Simon Munzert"
      title: "Professor of Data Science and Public Policy | Director, Data Science Lab"
      photo: "https://www.hertie-school.org/fileadmin/_processed_/8/3/csm_Munzert_800px_928934b780.jpg"
      url: "https://www.hertie-school.org/en/research/faculty-and-researchers/profile/person/munzert"
