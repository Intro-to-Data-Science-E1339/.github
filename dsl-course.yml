# This is the persistent COURSE org - it spans many cohorts (years). Cohorts are
# registered separately in .github/cohort-courses-pages.yml. The schedule changes
# year to year, so it's declared PER COHORT in that cohort's own
# classroom-config/schedule.yml, not here.

# Course admins for this course - the single source of truth for admin access
# (applied here AND mirrored into every cohort org).
