name: Release materials

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "Source materials repo (in this course org)"
        required: true
        type: choice
        options:
          - intro-to-data-science-e1339.github.io
          - course-materials-f2026
          - course-materials-f2025
      cohort_org:
        description: "Target cohort org"
        required: true
        type: choice
        options:
          - Intro-to-Data-Science-f2025
          - Intro-to-Data-Science-f2026
      release_labs:
        description: "Release labs this session?"
        type: boolean
        default: true
      labs_path:
        description: "Where to put it - leave blank to create/use a repo named 'labs' at its root. Otherwise: first segment = repo name, rest = folder path inside it (e.g. 'materials/labs')."
        required: false
      release_lectures:
        description: "Release lectures this session?"
        type: boolean
        default: true
      lectures_path:
        description: "Where to put it - leave blank to create/use a repo named 'lectures' at its root. Otherwise: first segment = repo name, rest = folder path inside it (e.g. 'materials/lectures')."
        required: false
      release_readings:
        description: "Release readings this session?"
        type: boolean
        default: true
      readings_path:
        description: "Where to put it - leave blank to create/use a repo named 'readings' at its root. Otherwise: first segment = repo name, rest = folder path inside it (e.g. 'materials/readings')."
        required: false
      sessions:
        description: "Session(s) to release - comma and/or range list, e.g. 1,3,5-7"
        required: true
      include_root_files:
        description: "Also release the syllabus + source README (root files) - overwrites"
        type: boolean
        default: false

jobs:
  check-team:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Verify the user may run actions for THIS repo
        env:
          GH_TOKEN: ${{ secrets.DSL_BOT_TOKEN }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
        run: |
          # Faculty & instructors have write+ on the course repos; students never do (and triggering a
          # workflow_dispatch already requires write), so repo permission is the gate.
          perm=$(gh api "repos/$REPO/collaborators/$ACTOR/permission" --jq '.permission' 2>/tmp/gherr || true)
          case "$perm" in admin|write|maintain) exit 0 ;; esac
          echo "::error::@$ACTOR lacks write on $REPO (permission='$perm'). gh api said:"
          cat /tmp/gherr || true
          exit 1

  release:
    needs: check-team
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: hertie-data-science-lab/dsl-teaching-course-setup
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Release
        env:
          GH_TOKEN: ${{ secrets.DSL_BOT_TOKEN }}
          SRC_ORG: ${{ github.repository_owner }}
          SRC_REPO: ${{ inputs.source_repo }}
          COHORT_ORG: ${{ inputs.cohort_org }}
          SESSIONS: ${{ inputs.sessions }}
          INC_ROOT: ${{ inputs.include_root_files }}
          RELEASE_LABS: ${{ inputs.release_labs }}
          PATH_LABS: ${{ inputs.labs_path }}
          RELEASE_LECTURES: ${{ inputs.release_lectures }}
          PATH_LECTURES: ${{ inputs.lectures_path }}
          RELEASE_READINGS: ${{ inputs.release_readings }}
          PATH_READINGS: ${{ inputs.readings_path }}
        run: |
          gh auth setup-git
          args=(--source-org "$SRC_ORG" --source-repo "$SRC_REPO"
                --cohort-org "$COHORT_ORG" --sessions "$SESSIONS")
          [ "$RELEASE_LABS" = "true" ] && destinations="$destinations labs=${PATH_LABS:-labs}"
          [ "$RELEASE_LECTURES" = "true" ] && destinations="$destinations lectures=${PATH_LECTURES:-lectures}"
          [ "$RELEASE_READINGS" = "true" ] && destinations="$destinations readings=${PATH_READINGS:-readings}"
          [ -n "$destinations" ] && args+=(--destinations "$destinations")
          [ "$INC_ROOT" = "true" ] && args+=(--syllabus --readme)
          python3 -m dsl_course.release "${args[@]}"
