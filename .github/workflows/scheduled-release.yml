name: Scheduled release

# Reads each cohort's classroom-config/schedule.yml `materials_releases:` plan and fires
# every release whose `when` datetime has arrived. Idempotent, so re-releasing on the next
# hour is a no-op. On the cron it releases for real; manual runs default to dry-run.
# Hourly so a `when` time-of-day is honoured to the hour (GitHub cron is UTC and best-effort).

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only - list what WOULD open, release nothing"
        type: boolean
        default: true

jobs:
  scheduled-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: hertie-data-science-lab/dsl-teaching-course-setup
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run scheduler
        env:
          GH_TOKEN: ${{ secrets.DSL_BOT_TOKEN }}
          COURSE: ${{ github.repository_owner }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          gh auth setup-git
          args=(--course-org "$COURSE" --all-cohorts)
          [ "$DRY_RUN" = "true" ] && args+=(--dry-run)
          python3 -m dsl_course.scheduler "${args[@]}"
